<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Add New Student</h2>
        <form method="post" enctype="multipart/form-data">
            <label>Name:</label><input type="text" name="name" required>
            <label>Roll Number:</label><input type="text" name="roll_number" required>
            <label>Course:</label><input type="text" name="course" required>
            <label>Upload Image (PNG/JPG):</label><input type="file" name="image" accept="image/*">
            <button type="submit" name="upload">Add via Image</button>
            <button type="submit" name="capture" value="1">Capture from Webcam</button>
        </form>
        <a href="/admin">Back to Dashboard</a>
    </div>
</body>
</html>
